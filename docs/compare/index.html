<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>Inter CJK — Font Comparison</title>
<style>
@font-face{font-family:'Inter CJK';src:url('../../fonts/InterCJKVariable.ttf');font-weight:100 900}
@font-face{font-family:'Inter';src:url('../../build/inter-variable.ttf');font-weight:100 900}
@font-face{font-family:'Pretendard JP';src:url('../../build/pretendard-variable.ttf');font-weight:100 900}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui;background:#fff;color:#111;padding:24px 32px;font-size:14px;max-width:1400px;margin:0 auto}
.ctrl{position:sticky;top:0;background:#fff;border-bottom:1px solid #eee;padding:12px 0;z-index:10;display:flex;gap:16px;align-items:center;flex-wrap:wrap}
.ctrl label{font-size:12px;color:#666;display:flex;align-items:center;gap:4px}
.ctrl input[type=range]{width:100px}
h2{font-size:11px;font-weight:600;color:#999;margin:28px 0 10px;text-transform:uppercase;letter-spacing:.5px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:#eee;border-radius:8px;overflow:hidden;margin-bottom:20px}
.g3>div{background:#fff;padding:14px}
.lbl{font-size:10px;color:#aaa;margin-bottom:4px;font-family:system-ui}
.s{font-size:var(--sz,20px);font-weight:var(--wt,400);line-height:1.5}
.f1 .s{font-family:'Inter CJK',sans-serif}
.f2 .s{font-family:'Inter',sans-serif}
.f3 .s{font-family:'Pretendard JP',sans-serif}
.feat{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:10px;margin-bottom:20px}
.feat .c{border:1px solid #eee;border-radius:8px;padding:12px}
.feat .t{font:11px/1.2 monospace;color:#555;margin-bottom:8px}
.feat .r{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.feat .r>div{font-size:20px;line-height:1.4}
table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:20px}
th,td{padding:5px 8px;border:1px solid #eee;text-align:left}
th{background:#f9f9f9;font-weight:600}
.ok{color:#22c55e}.no{color:#ef4444}
.btn{display:inline-flex;align-items:center;background:oklch(.96 .005 260);color:oklch(.25 .02 260);padding:10px 14px;border-radius:10px;font-size:14px;font-weight:500;gap:8px}
</style>
</head>
<body>
<h1 style="font-size:22px;margin-bottom:6px">Inter CJK — Font Comparison</h1>
<p style="color:#666;margin-bottom:20px;font-size:13px">Inter CJK vs Inter vs Pretendard JP</p>
<div class="ctrl">
<label>Size:<input type=range id=sz min=12 max=48 value=20><span id=sv>20</span>px</label>
<label>Weight:<input type=range id=wt min=100 max=900 step=100 value=400><span id=wv>400</span></label>
</div>
<div id=content></div>
<script>
const F=[['Inter CJK','f1'],['Inter','f2'],['Pretendard JP','f3']];
const $=document.getElementById('content');
function sec(title,samples){
let h='<h2>'+title+'</h2><div class="g3">';
for(const[fn,cls]of F){
h+='<div class="'+cls+'"><div class="lbl">'+fn+'</div>';
for(const s of samples)h+='<div class="s"'+(s[1]?' style="'+s[1]+'"':'')+'>'+s[0]+'</div>';
h+='</div>';
}
return h+'</div>';
}
function feat(features){
let h='<h2>OpenType Features</h2><div class="feat">';
for(const[tag,desc,text,css]of features){
h+='<div class="c"><div class="t">'+tag+' — '+desc+'</div><div class="r">';
for(const[fn,cls]of F){
h+='<div class="'+cls+'"><div class="lbl">'+fn+'</div><div class="s" style="font-feature-settings:\''+css+'\' 1">'+text+'</div></div>';
}
h+='</div></div>';
}
return h+'</div>';
}
let html='';
html+=sec('Korean + Latin Mixed',[['안녕하세요 Hello World 반갑습니다']]);
html+=sec('UI Text',[['₩1,234,567 결제하기 → 배송비 무료']]);
html+=sec('rclt — 한글 컨텍스트 기호 정렬',[['가@나 한→글 가:나 한-글 가(나)']]);
html+=sec('Display (opsz=32)',[['The quick brown fox','font-variation-settings:\'opsz\' 32;font-size:32px']]);
html+=feat([
['tnum','고정폭 숫자','₩1,111,111\n₩7,777,777','tnum'],
['zero','슬래시 0','0123456789','zero'],
['frac','분수','1/3 3/4 1/5 16/5','frac'],
['ss01','Open Digits','1234567890','ss01'],
['ss05','한국 현지화 (줄임표)','…저기… 있잖아… …알겠어…','ss05'],
['ss06','Disambiguation','Il1 Illegal 일리노이','ss06'],
['ss10','중간 크기 심벌','①②③④⑤⑥⑦⑧⑨⑩','ss10'],
['case','대문자 맞춤 기호','(HELLO) [WORLD] {가나다}','case'],
['dlig','합자','?! ¡¿What?!','dlig'],
['cv01','대체 1','1234567890','cv01'],
['cv08','I 세리프','Illinois I l 1','cv08'],
['cv11','단층 a','hamburger abcdefg','cv11'],
]);
html+=sec('Vertical Metrics — Button',[['<span class="btn">로그인</span> <span class="btn">Sign Up</span> <span class="btn">가입 →</span> <span class="btn">₩10,000 결제</span>']]);
html+='<h2>Weight Ramp</h2><div class="g3">';
for(const[fn,cls]of F){
html+='<div class="'+cls+'"><div class="lbl">'+fn+'</div>';
for(const w of[100,300,400,500,700,900])html+='<div class="s" style="font-weight:'+w+'">'+w+' 안녕 Hello ₩1,000</div>';
html+='</div>';
}
html+='</div>';
html+=sec('Japanese',[['東京タワー Tokyo Tower こんにちは']]);
html+=`<h2>fontbakery 비교</h2><table>
<tr><th>Check</th><th>Inter</th><th>Pretendard</th><th>SUIT</th><th>Inter CJK</th></tr>
<tr><td>FAIL 수</td><td class=no>8</td><td class=no>7</td><td>2</td><td class=ok>5</td></tr>
<tr><td>smart_dropout</td><td class=no>FAIL</td><td class=no>FAIL</td><td class=no>FAIL</td><td class=ok>PASS ✓</td></tr>
<tr><td>no_mac_entries</td><td>PASS</td><td class=no>FAIL</td><td>PASS</td><td class=ok>PASS ✓</td></tr>
<tr><td>chws feature</td><td>—</td><td>WARN</td><td>WARN</td><td class=ok>PASS ✓</td></tr>
<tr><td>fvar/STAT</td><td class=no>FAIL</td><td>PASS</td><td>PASS</td><td class=ok>PASS ✓</td></tr>
<tr><td>duplicate_instances</td><td class=no>FAIL</td><td>PASS</td><td>PASS</td><td class=ok>PASS ✓</td></tr>
</table>`;
$.innerHTML=html;
const sz=document.getElementById('sz'),wt=document.getElementById('wt');
const sv=document.getElementById('sv'),wv=document.getElementById('wv');
function u(){document.body.style.setProperty('--sz',sz.value+'px');document.body.style.setProperty('--wt',wt.value);sv.textContent=sz.value;wv.textContent=wt.value}
sz.oninput=wt.oninput=u;
</script>
</body>
</html>
